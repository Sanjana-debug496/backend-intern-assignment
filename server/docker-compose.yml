version: '3.9'

services:

  web:

    build: .

    command: python manage.py runserver 0.0.0.0:8000

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    depends_on:
      - db

    environment:
      - DB_NAME=backend_db
      - DB_USER=postgres
      - DB_PASSWORD=sanjana123
      - DB_HOST=db
      - DB_PORT=5432


  db:

    image: postgres:16

    volumes:
      - postgres_data:/var/lib/postgresql/data/

    environment:
      - POSTGRES_DB=backend_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=sanjana123

    ports:
      - "5432:5432"
    
  redis:

    image: redis:7

    ports:
      - "6379:6379"


volumes:

  postgres_data: